name: Auto-Scaling-Instance-Deployment-Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # IAM 사용자 액세스 키
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # IAM 사용자 비밀 키
          aws-region: ${{ secrets.AWS_REGION }} # 대상 AWS 리전
      
      # S3 버킷에 Nginx 설정 파일과 웹 자산 업로드
      - name: Upload Config and Assets to S3
        run: |
          aws s3 cp ./default.conf s3://${{ secrets.S3_BUCKET_NAME }}/config/default.conf
          aws s3 sync ./html/ s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete

      # ECR에 Docker 이미지 빌드 및 푸시
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest